naming:
  FunctionNaming:
    ignoreAnnotated: ["Composable"]

complexity:
  TooManyFunctions:
    thresholdInClasses: 20
  # Compose UI functions are naturally verbose (declarative nesting) and take one
  # parameter per piece of state/callback a screen needs — neither threshold maps to
  # real complexity the way it does for ordinary functions.
  LongMethod:
    ignoreAnnotated: ["Composable"]
  LongParameterList:
    ignoreAnnotated: ["Composable"]

style:
  MagicNumber:
    # Hex color literals (Color(0xFF6750A4)) aren't meaningfully refactorable
    # into named constants — the literal *is* the named constant.
    excludes: ["**/theme/Color.kt"]
